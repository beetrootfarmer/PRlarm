name: PR Review Reminder

on:
  schedule:
    # 한국 시간 오후 2시 (UTC 05:00), 월-금요일만 실행
    - cron: "0 5 * * 1-5"
  # 수동 실행 옵션 추가 (테스트용)
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "16"

      - name: Install dependencies
        run: npm install @actions/core @actions/github

      - name: Create scripts directory
        run: mkdir -p .github/scripts

      - name: Create PR reminder script
        run: |
          cat > .github/scripts/pr-reminder.js << 'EOL'
          // pr-reminder.js 파일 내용을 여기에 붙여넣기
          // 위에서 제공한 JavaScript 코드 전체를 여기에 붙여넣으세요
          EOL

      - name: Run PR reminder script
        id: pr-reminder
        run: node .github/scripts/pr-reminder.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.24.0
        with:
          channel-id: "C08JG1LKT44" # 슬랙 채널 ID
          slack-message: ${{ steps.pr-reminder.outputs.message }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
